<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>今日惊喜签 · 测一测你的好运</title>
    <meta
      name="description"
      content="一键抽取今日惊喜签，好玩又轻量，分享给朋友一起测好运。"
    />

    <!-- Open Graph (WeChat link preview reads static HTML meta) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="今日惊喜签 · 测一测你的好运" />
    <meta
      property="og:description"
      content="一键抽取今日惊喜签，好玩又轻量，分享给朋友一起测好运。"
    />
    <!-- Replace YOUR_VERCEL_DOMAIN after first deploy, or set VITE_OG_IMAGE_URL -->
    <meta property="og:image" content="https://share-everything.vercel.app/og-image.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:url" content="https://share-everything.vercel.app/" />

    <!-- WeChat-specific -->
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
